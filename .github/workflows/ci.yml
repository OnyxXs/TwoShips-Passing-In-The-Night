name: CI - Two Ships Passing In The Night

on:
  workflow_dispatch:
  push:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Init output files
        run: touch unit-output.txt e2e-output.txt

      # Linter
      - name: Run linter
        run: npx eslint src/
        continue-on-error: false

      # Tests unitaires (Vitest)
      - name: Run unit tests
        id: unit_tests
        run: npm test 2>&1 | tee unit-output.txt
        continue-on-error: true

      - name: Annotate unit test results
        if: always()
        run: |
          FAILED=$(grep -E "^[[:space:]]*x " unit-output.txt || true)
          PASSED=$(grep -E "^[[:space:]]*v " unit-output.txt || true)

          if [ -n "$FAILED" ]; then
            echo "$FAILED" | while IFS= read -r line; do
              TEST_NAME=$(echo "$line" | sed 's/^[[:space:]]*x //')
              echo "::error title=Test unitaire échoué::$TEST_NAME"
            done
          fi

          if [ -n "$PASSED" ]; then
            echo "$PASSED" | while IFS= read -r line; do
              TEST_NAME=$(echo "$line" | sed 's/^[[:space:]]*v //')
              echo "::notice title=Test unitaire réussi::$TEST_NAME"
            done
          fi

          # Résumé des tests unitaires passés
          TOTAL_FAIL=$(grep -c "x " unit-output.txt || true)
          TOTAL_PASS=$(grep -c "v " unit-output.txt || true)
          if grep -q "failed" unit-output.txt; then
            echo "::error title=Tests unitaires — Échec::$TOTAL_FAIL test(s) échoué(s), $TOTAL_PASS passé(s)"
          else
            echo "::notice title=Tests unitaires — Succès::Tous les tests unitaires sont passés ($TOTAL_PASS)"
          fi

      # Tests fonctionnels (Playwright)
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run functional tests
        id: e2e_tests
        run: npm run test:e2e 2>&1 | tee e2e-output.txt
        continue-on-error: true

      - name: Annotate functional test results
        if: always()
        run: |
          FAILED=$(grep -E "^\s+[0-9]+\) " e2e-output.txt || true)
          PASSED=$(grep -E "v" e2e-output.txt || true)

          if [ -n "$FAILED" ]; then
            echo "$FAILED" | while IFS= read -r line; do
              TEST_NAME=$(echo "$line" | sed 's/^[[:space:]]*[0-9]*)[[:space:]]*//')
              echo "::error title=Test fonctionnel échoué::$TEST_NAME"
            done
          fi

          # Résumé des tests fonctionnels passés
          if grep -q "failed" e2e-output.txt; then
            TOTAL_FAIL=$(grep -c "failed\|x" e2e-output.txt || true)
            echo "::error title=Tests fonctionnels — Échec::$TOTAL_FAIL test(s) Playwright ont échoué"
          else
            echo "::notice title=Tests fonctionnels — Succès::Tous les tests Playwright sont passés"
          fi

      # Audit des dépendances
      - name: Dependency audit
        run: |
          npm audit --audit-level=moderate 2>&1 | tee audit-output.txt || true

      - name: Annotate dependency audit results
        if: always()
        run: |
          CRITICAL=$(grep -c "critical" audit-output.txt || true)
          HIGH=$(grep -c "high" audit-output.txt || true)
          MODERATE=$(grep -c "moderate" audit-output.txt || true)

          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error title=Audit dépendances — Vulnérabilités critiques::$CRITICAL vulnérabilité(s) critique(s) détectée(s) — action requise immédiatement"
          fi
          if [ "$HIGH" -gt 0 ]; then
            echo "::error title=Audit dépendances — Vulnérabilités élevées::$HIGH vulnérabilité(s) de sévérité haute détectée(s)"
          fi
          if [ "$MODERATE" -gt 0 ]; then
            echo "::warning title=Audit dépendances — Vulnérabilités modérées::$MODERATE vulnérabilité(s) modérée(s) détectée(s)"
          fi
          if [ "$CRITICAL" -eq 0 ] && [ "$HIGH" -eq 0 ] && [ "$MODERATE" -eq 0 ]; then
            echo "::notice title=Audit dépendances — OK::Aucune vulnérabilité détectée"
          fi

      # Bilan final du CI
      - name: Annotate CI global result
        if: always()
        run: |
          UNIT_FAIL=$(grep -q "failed" unit-output.txt && echo "1" || echo "0")
          E2E_FAIL=$(grep -q "failed" e2e-output.txt && echo "1" || echo "0")

          if [ "$UNIT_FAIL" = "1" ] || [ "$E2E_FAIL" = "1" ]; then
            echo "::error title=CI — Échec global::Le pipeline CI a détecté des échecs."
          else
            echo "::notice title=CI — Succès global::Tous les contrôles CI ont passé avec succès"
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/twoshipspassinginthenight:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/twoshipspassinginthenight:latest
